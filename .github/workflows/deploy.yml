name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vball-tracker
        uses: actions/checkout@v4

      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      # Per D-08, D-09: @keg scope routes to Verdaccio. Written in CI — TAILSCALE_IP must not be committed.
      # CRITICAL: _authToken=verdaccio-anonymous satisfies npm (v5.3+) client-side Authorization requirement.
      # Verdaccio ignores token content when publish: $all is configured. Without this line, npm exits
      # with ENEEDAUTH before the request reaches Verdaccio.
      - name: Write .npmrc for Verdaccio
        env:
          TAILSCALE_IP: ${{ secrets.TAILSCALE_IP }}
        run: |
          echo "@keg:registry=http://${TAILSCALE_IP}:4873" > .npmrc
          echo "//${TAILSCALE_IP}:4873/:_authToken=verdaccio-anonymous" >> .npmrc

      # Needed for docker/login-action (uses Docker daemon, not buildkitd)
      - name: Configure insecure registry
        env:
          TAILSCALE_IP: ${{ secrets.TAILSCALE_IP }}
        run: |
          echo "{\"insecure-registries\":[\"${TAILSCALE_IP}:5000\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      # Needed for build-push-action (uses buildkitd, ignores daemon.json)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."${{ secrets.TAILSCALE_IP }}:5000"]
              http = true
              insecure = true

      - name: Login to Zot registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TAILSCALE_IP }}:5000
          username: admin
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push vball-tracker
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.TAILSCALE_IP }}:5000/vball-tracker:latest
            ${{ secrets.TAILSCALE_IP }}:5000/vball-tracker:${{ github.sha }}

      - name: Deploy on Jonas
        env:
          TAILSCALE_IP: ${{ secrets.TAILSCALE_IP }}
          JONAS_SSH_PRIVATE_KEY: ${{ secrets.JONAS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${JONAS_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_ed25519 \
              root@${TAILSCALE_IP} \
              "docker pull ${TAILSCALE_IP}:5000/vball-tracker:latest && \
               docker stop vball-tracker || true && \
               docker rm vball-tracker || true && \
               docker run -d --name vball-tracker --restart unless-stopped \
                 -p 3000:3000 \
                 -v /mnt/user/appdata/vball-tracker:/data \
                 --env-file /mnt/user/appdata/vball-tracker/.env \
                 ${TAILSCALE_IP}:5000/vball-tracker:latest"
