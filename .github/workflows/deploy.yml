name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      service: vball-tracker
      host_port: 3000
      container_port: 3000
      appdata_path: /mnt/user/appdata/vball-tracker
      run_extra_args: --env-file /mnt/user/appdata/vball-tracker/.env
      verdaccio_setup: true
    secrets: inherit
